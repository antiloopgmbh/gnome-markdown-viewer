# elementary / AppCenter build.
# Uses the elementary Platform so the app is natively themed (Pantheon/Granite)
# on elementary OS. Do NOT ship this variant to Flathub: the bundled Granite
# runtime forces the elementary look on every desktop, including GNOME.
# The GNOME/Flathub variant lives in com.antiloop.MarkdownViewer.gnome.yml.
id: com.antiloop.MarkdownViewer
runtime: io.elementary.Platform
runtime-version: '8'
sdk: io.elementary.Sdk
command: main.py

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=cups
  - --share=ipc
  - --device=dri
  - --filesystem=home:ro

modules:
  - antiloop-md-viewer.module.yml
