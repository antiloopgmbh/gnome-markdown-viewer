# Shared build module for Antiloop Chiru.
# Referenced by both the elementary (AppCenter) and GNOME (Flathub) manifests,
# so the actual build steps live in exactly one place and cannot drift apart.
name: antiloop-md-viewer
buildsystem: simple
build-commands:
  - install -d /app/bin
  - install -m 755 src/main.py /app/bin/main.py
  - install -m 644 src/app.py /app/bin/app.py
  - install -m 644 src/window.py /app/bin/window.py

  - install -d /app/bin/core
  - install -m 644 src/core/*.py /app/bin/core/

  - install -d /app/bin/widgets
  - install -m 644 src/widgets/*.py /app/bin/widgets/

  - install -d /app/bin/assets
  - install -m 644 src/assets/*.html /app/bin/assets/
  - install -m 644 src/assets/*.css /app/bin/assets/
  - install -m 644 src/assets/*.js /app/bin/assets/

  - install -d /app/share/applications
  - install -m 644 com.antiloop.MarkdownViewer.desktop /app/share/applications/com.antiloop.MarkdownViewer.desktop

  - install -d /app/share/metainfo
  - install -m 644 com.antiloop.MarkdownViewer.metainfo.xml /app/share/metainfo/com.antiloop.MarkdownViewer.metainfo.xml

  - install -d /app/share/icons/hicolor/scalable/apps
  - install -m 644 com.antiloop.MarkdownViewer.svg /app/share/icons/hicolor/scalable/apps/com.antiloop.MarkdownViewer.svg

  - install -d /app/share/icons/hicolor/scalable/actions
  - install -m 644 src/assets/icons/*.svg /app/share/icons/hicolor/scalable/actions/
sources:
  - type: dir
    path: .
